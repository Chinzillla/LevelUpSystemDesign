name: Foundations CI

on:
  push:
    paths:
      - "Foundations/**"
      - ".github/workflows/foundations.yml"
  pull_request:
    paths:
      - "Foundations/**"
      - ".github/workflows/foundations.yml"
  workflow_dispatch:

jobs:
  test-foundations:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Foundations/backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m py_compile app.py db.py routes/messages.py

      - name: Check frontend JavaScript syntax
        run: |
          node --check ../api.js
          node --check ../messages.js
          node --check ../main.js

      - name: Run backend CRUD tests
        run: pytest -q